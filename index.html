  <style>
    :root {
      --bg: #0b1220;
      --panel: #101a2e;
      --panel-2: #16233b;
      --text: #f6f8fb;
      --muted: #aeb9c9;
      --green: #22e58f;
      --red: #ff5a5f;
      --line: rgba(255, 255, 255, .12);
      --shadow: 0 24px 80px rgba(0, 0, 0, .34);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
    }

    a { color: inherit; text-decoration: none; }

    .wrap {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(16px);
      background: rgba(11, 18, 32, .82);
      border-bottom: 1px solid var(--line);
    }

    .topbar-inner {
      min-height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      color: var(--bg);
      background: var(--green);
      font-weight: 900;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .nav a:hover { color: var(--text); }
